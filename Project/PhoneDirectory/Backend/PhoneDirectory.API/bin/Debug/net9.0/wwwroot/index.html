<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Телефонный справочник</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Загрузочный экран -->
        <div id="loading" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- Экран входа -->
        <div id="login-screen" class="screen">
            <div class="auth-container">
                <div class="auth-card">
                    <h1><i class="fas fa-phone-alt"></i> Телефонный справочник</h1>
                    <div class="auth-form">
                        <div class="form-group">
                            <label for="username"><i class="fas fa-user"></i> Имя пользователя:</label>
                            <input type="text" id="username" placeholder="Введите имя пользователя">
                        </div>
                        <div class="form-group">
                            <label for="password"><i class="fas fa-lock"></i> Пароль:</label>
                            <input type="password" id="password" placeholder="Введите пароль">
                        </div>
                        <button id="login-btn" class="btn btn-primary btn-block">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </button>
                        <button id="show-register-btn" class="btn btn-secondary btn-block">
                            <i class="fas fa-user-plus"></i> Регистрация
                        </button>
                        <div id="login-error" class="error-message"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Экран регистрации -->
        <div id="register-screen" class="screen" style="display: none;">
            <div class="auth-container">
                <div class="auth-card">
                    <h1><i class="fas fa-user-plus"></i> Регистрация</h1>
                    <div class="auth-form">
                        <div class="form-group">
                            <label for="reg-username"><i class="fas fa-user"></i> Имя пользователя:</label>
                            <input type="text" id="reg-username" placeholder="Введите имя пользователя">
                        </div>
                        <div class="form-group">
                            <label for="reg-password"><i class="fas fa-lock"></i> Пароль:</label>
                            <input type="password" id="reg-password" placeholder="Введите пароль">
                        </div>
                        <div class="form-group">
                            <label for="reg-confirm-password"><i class="fas fa-lock"></i> Подтвердите пароль:</label>
                            <input type="password" id="reg-confirm-password" placeholder="Повторите пароль">
                        </div>
                        <button id="register-btn" class="btn btn-primary btn-block">
                            <i class="fas fa-user-plus"></i> Зарегистрироваться
                        </button>
                        <button id="show-login-btn" class="btn btn-secondary btn-block">
                            <i class="fas fa-arrow-left"></i> Назад ко входу
                        </button>
                        <div id="register-error" class="error-message"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Основной интерфейс -->
        <div id="main-screen" class="screen" style="display: none;">
            <header>
                <div class="header-left">
                    <h1><i class="fas fa-phone-alt"></i> Справочник</h1>
                </div>
                <div class="header-right">
                    <span id="user-info"></span>
                    <button id="logout-btn" class="btn btn-outline">
                        <i class="fas fa-sign-out-alt"></i> Выйти
                    </button>
                </div>
            </header>

            <main>
                <div class="sidebar">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Поиск по справочнику...">
                        <button id="search-btn"><i class="fas fa-search"></i></button>
                    </div>
                    
                    <div class="filters">
                        <select id="department-filter">
                            <option value="">Все подразделения</option>
                        </select>
                        <select id="position-filter">
                            <option value="">Все должности</option>
                        </select>
                    </div>
                    
                    <button id="edit-profile-btn" class="btn btn-primary">
                        <i class="fas fa-edit"></i> Редактировать профиль
                    </button>
                </div>

                <div class="content">
                    <div id="directory-content">
                        <h2>Список абонентов</h2>
                        <div id="subscribers-list"></div>
                        <div id="pagination"></div>
                    </div>

                    <div id="edit-profile-content" style="display: none;">
                        <h2>Редактирование профиля</h2>
                        <div id="profile-form"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/app.js"></script>
    <!-- Уведомления (toast) -->
    <div id="toast-container" style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;">
    </div>
</body>
</html>
